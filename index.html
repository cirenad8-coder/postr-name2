<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اكتب اسمك</title>
<style>
body {
    text-align: center;
    background: #0e2a47;
    color: white;
    font-family: Arial;
}

input {
    padding: 10px;
    font-size: 18px;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>اكتب اسمك</h2>

<input id="nameInput" placeholder="اكتب اسمك هنا">
<br>
<button onclick="draw()">عرض</button>

<br><br>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const img = new Image();
img.src = 'poster.jpg';

img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    draw();
};

function draw() {
    const text = document.getElementById('nameInput').value;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    ctx.font = '90px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillText(text, canvas.width / 2, canvas.height - 400);
}
</script>

</body>
</html>
